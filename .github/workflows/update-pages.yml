name: Update GitHub Pages

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag that triggered this update'
        required: false
        type: string
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  release:
    types: [published, edited]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests jinja2
      - name: Restore download stats
        uses: actions/cache@v5
        with:
          path: docs/download_stats.json
          key: download-stats-${{ github.run_id }}
          restore-keys: |
            download-stats-
      - name: Generate index pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_pages.py \
            --owner ${{ github.repository_owner }} \
            --repo ${{ github.event.repository.name }} \
            --token $GITHUB_TOKEN \
            --output docs
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Delete old github-pages artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[] | select(.name == "github-pages") | .id')
          for id in $ARTIFACTS; do
            echo "Deleting artifact $id"
            gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs'
      - name: Keep only the latest github-pages artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[] | select(.name == "github-pages") | .id')

          FIRST=true
          for id in $ARTIFACTS; do
            if [ "$FIRST" = true ]; then
              echo "Keeping latest artifact $id"
              FIRST=false
            else
              echo "Deleting old artifact $id"
              gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$id
            fi
          done
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

